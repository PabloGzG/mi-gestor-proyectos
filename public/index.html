<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Proyectos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">
    <h1>Mis Proyectos Realizados</h1>

    <!-- Formulario para crear un nuevo proyecto -->
    <form id="formulario-proyecto">
        <input type="text" id="nombre-input" placeholder="Nombre del proyecto" required>
        <button type="submit">Agregar Proyecto</button>
    </form>

    <!-- Contenedor donde JavaScript pintará los proyectos del servidor -->
    <div id="lista-proyectos">
        <!-- Las tarjetas de los proyectos se cargarán aquí dinámicamente -->
    </div>
    <script src="app.js"></script>
    
</body>
</html>
